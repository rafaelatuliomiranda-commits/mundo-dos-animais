<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 Mundo dos Animais</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Baloo 2',cursive;
  background:#0f0c29;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;
  position:relative;
}

.stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:white;opacity:0;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:0.8}}

.app{position:relative;z-index:1;width:100%;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}

.hdr{width:100%;padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-family:'Baloo 2',cursive;font-weight:900;font-size:clamp(1.1rem,4.5vw,1.6rem);background:linear-gradient(90deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-counter{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(0.85rem,3.5vw,1.1rem);color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);padding:3px 12px;border-radius:99px}

.carousel{flex:1;width:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

.card{
  position:absolute;
  width:min(90vw,400px);
  height:min(calc(100dvh - 130px),680px);
  display:flex;flex-direction:column;
  border-radius:32px;overflow:hidden;
  transition:transform 0.42s cubic-bezier(.68,-0.4,.27,1.4),opacity 0.32s ease;
  will-change:transform,opacity;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.card.active{transform:translateX(0) scale(1);opacity:1;z-index:3}
.card.prev{transform:translateX(-115%) scale(0.85);opacity:0;pointer-events:none}
.card.next{transform:translateX(115%) scale(0.85);opacity:0;pointer-events:none}
.card.gone{display:none}

.card-animal{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}

.emoji{font-size:clamp(130px,36vw,220px);line-height:1;display:block;filter:drop-shadow(0 8px 28px rgba(0,0,0,0.4));position:relative;z-index:1;flex-shrink:0}
.emoji.bounce{animation:bnc 0.6s cubic-bezier(.36,.07,.19,.97)}
.emoji.wiggle{animation:wgl 0.55s ease}
.emoji.pop{animation:pop 0.45s cubic-bezier(.36,.07,.19,.97)}
@keyframes bnc{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-30px) scale(1.14)}60%{transform:translateY(-10px) scale(1.07)}}
@keyframes wgl{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg) scale(1.12)}40%{transform:rotate(15deg) scale(1.12)}60%{transform:rotate(-9deg)}80%{transform:rotate(9deg)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(0.88)}100%{transform:scale(1)}}

.card-names{padding:10px 16px 8px;display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.3);flex-shrink:0}
.name-pt{font-family:'Baloo 2',cursive;font-weight:900;font-size:clamp(2rem,9vw,3rem);color:white;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,0.5)}
.name-en{font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(1rem,4vw,1.35rem);color:rgba(255,255,255,0.55);margin-top:1px}

.card-btns{display:flex;gap:8px;padding:10px 12px 14px;background:rgba(0,0,0,0.4);flex-shrink:0}
.btn{flex:1;border:none;border-radius:18px;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(0.8rem,3.2vw,1.05rem);padding:clamp(10px,2.5vw,16px) 4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform 0.1s,box-shadow 0.1s;box-shadow:0 4px 0 rgba(0,0,0,0.3);position:relative;overflow:hidden}
.btn:active{transform:translateY(3px) scale(0.96);box-shadow:0 1px 0 rgba(0,0,0,0.3)}
.btn-icon{font-size:clamp(1.5rem,5.5vw,2.1rem)}
.btn-sound{background:linear-gradient(155deg,#FFD93D,#FF9F45);color:#5a2d00}
.btn-pt{background:linear-gradient(155deg,#6BCB77,#3a9e47);color:#0a2e10}
.btn-en{background:linear-gradient(155deg,#5BA4FF,#1565FF);color:white}
.btn::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity 0.2s;border-radius:inherit}
.btn:active::after{opacity:0.15}

.nav{position:fixed;top:50%;z-index:10;transform:translateY(-50%);background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,0.18);border-radius:50%;width:clamp(46px,12vw,62px);height:clamp(46px,12vw,62px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:clamp(1.2rem,4.5vw,1.7rem);transition:transform 0.1s,background 0.2s;color:white}
.nav:active{transform:translateY(-50%) scale(0.88)}
.nav-l{left:clamp(4px,1.5vw,12px)}
.nav-r{right:clamp(4px,1.5vw,12px)}

.dots{position:fixed;bottom:clamp(8px,2dvh,18px);left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s ease;flex-shrink:0}
.dot.on{background:white;width:20px;border-radius:4px}

.spk{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15);border-radius:99px;padding:5px 14px;font-size:0.78rem;font-weight:700;color:white;display:none;align-items:center;gap:6px;z-index:5;white-space:nowrap}
.spk.on{display:flex;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) scale(0.8)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.waves{display:flex;gap:2px;align-items:center}
.waves span{display:block;width:3px;border-radius:2px;background:#FFD93D;animation:wv 0.5s ease infinite alternate}
.waves span:nth-child(1){height:5px;animation-delay:0s}
.waves span:nth-child(2){height:11px;animation-delay:0.12s}
.waves span:nth-child(3){height:7px;animation-delay:0.25s}
.waves span:nth-child(4){height:13px;animation-delay:0.08s}
@keyframes wv{from{transform:scaleY(0.4)}to{transform:scaleY(1.5)}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="app">
  <div class="hdr">
    <div class="hdr-title">🐾 Mundo dos Animais</div>
    <div class="hdr-counter" id="counter">1 / 50</div>
  </div>
  <div class="carousel" id="carousel"></div>
</div>

<button class="nav nav-l" onclick="go(-1)">◀</button>
<button class="nav nav-r" onclick="go(1)">▶</button>
<div class="dots" id="dots"></div>

<script>
const ANIMALS = [
  {emoji:'🐶',pt:'Cachorro',  en:'Dog',         sound:'dog.mp3',         color:'#FF8C00'},
  {emoji:'🐱',pt:'Gato',      en:'Cat',          sound:'cat.mp3',         color:'#9C27B0'},
  {emoji:'🐮',pt:'Vaca',      en:'Cow',          sound:'cow.mp3',         color:'#8B6914'},
  {emoji:'🐷',pt:'Porco',     en:'Pig',          sound:'pig.mp3',         color:'#FF4081'},
  {emoji:'🐸',pt:'Sapo',      en:'Frog',         sound:'frog.mp3',        color:'#4CAF50'},
  {emoji:'🐔',pt:'Galinha',   en:'Chicken',      sound:'chicken.mp3',     color:'#FFA000'},
  {emoji:'🐧',pt:'Pinguim',   en:'Penguin',      sound:'penguin.mp3',     color:'#1565C0'},
  {emoji:'🦁',pt:'Leão',      en:'Lion',         sound:'lion.mp3',        color:'#E65100'},
  {emoji:'🐯',pt:'Tigre',     en:'Tiger',        sound:'tiger.mp3',       color:'#FF6F00'},
  {emoji:'🐻',pt:'Urso',      en:'Bear',         sound:'bear.mp3',        color:'#5D4037'},
  {emoji:'🐼',pt:'Panda',     en:'Panda',        sound:'panda.mp3',       color:'#424242'},
  {emoji:'🐨',pt:'Coala',     en:'Koala',        sound:'koala.mp3',       color:'#607D8B'},
  {emoji:'🐆',pt:'Leopardo',  en:'Leopard',      sound:'leopard.mp3',     color:'#F57F17'},
  {emoji:'🦊',pt:'Raposa',    en:'Fox',          sound:'fox.mp3',         color:'#BF360C'},
  {emoji:'🐺',pt:'Lobo',      en:'Wolf',         sound:'wolf.mp3',        color:'#546E7A'},
  {emoji:'🐗',pt:'Javali',    en:'Boar',         sound:'boar.mp3',        color:'#6A1B9A'},
  {emoji:'🐴',pt:'Cavalo',    en:'Horse',        sound:'horse.mp3',       color:'#795548'},
  {emoji:'🦄',pt:'Unicórnio', en:'Unicorn',      sound:'horse.mp3',       color:'#E91E63'},
  {emoji:'🐂',pt:'Touro',     en:'Bull',         sound:'bull.mp3',        color:'#B71C1C'},
  {emoji:'🐑',pt:'Ovelha',    en:'Sheep',        sound:'sheep.mp3',       color:'#78909C'},
  {emoji:'🐐',pt:'Cabra',     en:'Goat',         sound:'goat.mp3',        color:'#558B2F'},
  {emoji:'🦌',pt:'Cervo',     en:'Deer',         sound:'deer.mp3',        color:'#BF6900'},
  {emoji:'🐘',pt:'Elefante',  en:'Elephant',     sound:'elephant.mp3',    color:'#546E7A'},
  {emoji:'🦏',pt:'Rinoceronte',en:'Rhino',       sound:'rhino.mp3',       color:'#795548'},
  {emoji:'🦛',pt:'Hipopótamo',en:'Hippo',        sound:'hippo.mp3',       color:'#3949AB'},
  {emoji:'🦒',pt:'Girafa',    en:'Giraffe',      sound:'giraffe.mp3',     color:'#F9A825'},
  {emoji:'🦓',pt:'Zebra',     en:'Zebra',        sound:'zebra.mp3',       color:'#37474F'},
  {emoji:'🦍',pt:'Gorila',    en:'Gorilla',      sound:'gorilla.mp3',     color:'#4E342E'},
  {emoji:'🐒',pt:'Macaco',    en:'Monkey',       sound:'monkey.mp3',      color:'#FF8F00'},
  {emoji:'🦘',pt:'Canguru',   en:'Kangaroo',     sound:'kangaroo.mp3',    color:'#E64A19'},
  {emoji:'🐊',pt:'Crocodilo', en:'Crocodile',    sound:'crocodile.mp3',   color:'#2E7D32'},
  {emoji:'🐢',pt:'Tartaruga', en:'Turtle',       sound:'turtle.mp3',      color:'#388E3C'},
  {emoji:'🦎',pt:'Lagarto',   en:'Lizard',       sound:'lizard.mp3',      color:'#9E9D24'},
  {emoji:'🐍',pt:'Cobra',     en:'Snake',        sound:'snake.mp3',       color:'#6A1B9A'},
  {emoji:'🦕',pt:'Dinossauro',en:'Dinosaur',     sound:'dinosaur.mp3',    color:'#1B5E20'},
  {emoji:'🐬',pt:'Golfinho',  en:'Dolphin',      sound:'dolphin.mp3',     color:'#0277BD'},
  {emoji:'🐳',pt:'Baleia',    en:'Whale',        sound:'whale.mp3',       color:'#01579B'},
  {emoji:'🦈',pt:'Tubarão',   en:'Shark',        sound:'shark.mp3',       color:'#283593'},
  {emoji:'🐙',pt:'Polvo',     en:'Octopus',      sound:'octopus.mp3',     color:'#AD1457'},
  {emoji:'🦀',pt:'Caranguejo',en:'Crab',         sound:'crab.mp3',        color:'#B71C1C'},
  {emoji:'🦞',pt:'Lagosta',   en:'Lobster',      sound:'lobster.mp3',     color:'#C62828'},
  {emoji:'🐠',pt:'Peixe',     en:'Fish',         sound:'fish.mp3',        color:'#0288D1'},
  {emoji:'🦋',pt:'Borboleta', en:'Butterfly',    sound:'butterfly.mp3',   color:'#C2185B'},
  {emoji:'🐝',pt:'Abelha',    en:'Bee',          sound:'bee.mp3',         color:'#F9A825'},
  {emoji:'🐛',pt:'Lagarta',   en:'Caterpillar',  sound:'caterpillar.mp3', color:'#558B2F'},
  {emoji:'🐞',pt:'Joaninha',  en:'Ladybug',      sound:'ladybug.mp3',     color:'#D32F2F'},
  {emoji:'🦉',pt:'Coruja',    en:'Owl',          sound:'owl.mp3',         color:'#6D4C41'},
  {emoji:'🦅',pt:'Águia',     en:'Eagle',        sound:'eagle.mp3',       color:'#BF360C'},
  {emoji:'🦜',pt:'Papagaio',  en:'Parrot',       sound:'parrot.mp3',      color:'#2E7D32'},
  {emoji:'🦩',pt:'Flamingo',  en:'Flamingo',     sound:'flamingo.mp3',    color:'#E91E63'},
];

let cur=0, busy=false;
const total=ANIMALS.length;

// Stars background
(()=>{
  const c=document.getElementById('stars');
  for(let i=0;i<30;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*5}s;animation-delay:-${Math.random()*6}s`;
    c.appendChild(s);
  }
})();

function buildCards(){
  const wrap=document.getElementById('carousel');
  wrap.innerHTML='';
  ANIMALS.forEach((a,i)=>{
    const card=document.createElement('div');
    card.className='card'+(i===0?' active':' gone');
    card.id='c'+i;
    card.style.background=`linear-gradient(160deg,${a.color}55,${a.color}22,rgba(8,8,28,0.97))`;
    card.innerHTML=`
      <div class="card-animal" style="background:linear-gradient(160deg,${a.color}50,${a.color}18,rgba(5,5,20,0.95))">
        <span class="spk" id="spk${i}"><span class="waves"><span></span><span></span><span></span><span></span></span>Ouvindo...</span>
        <span class="emoji" id="em${i}">${a.emoji}</span>
      </div>
      <div class="card-names">
        <div class="name-pt">${a.pt}</div>
        <div class="name-en">${a.en}</div>
      </div>
      <div class="card-btns">
        <button class="btn btn-sound" onclick="play(${i},'s')">
          <span class="btn-icon">🔊</span><span>Som</span>
        </button>
        <button class="btn btn-pt" onclick="play(${i},'p')">
          <span class="btn-icon">🇧🇷</span><span>Português</span>
        </button>
        <button class="btn btn-en" onclick="play(${i},'e')">
          <span class="btn-icon">🇺🇸</span><span>English</span>
        </button>
      </div>`;
    wrap.appendChild(card);
  });
  buildDots();
}

function buildDots(){
  const d=document.getElementById('dots');d.innerHTML='';
  const show=Math.min(total,9);
  for(let i=0;i<show;i++){
    const dot=document.createElement('div');
    dot.className='dot'+(i===0?' on':'');
    dot.id='dot'+i;d.appendChild(dot);
  }
}

function updateDots(){
  document.getElementById('counter').textContent=(cur+1)+' / '+total;
  const show=Math.min(total,9);
  const seg=Math.round(cur/(total-1)*(show-1));
  for(let i=0;i<show;i++){
    const d=document.getElementById('dot'+i);
    if(d) d.className='dot'+(i===seg?' on':'');
  }
}

// Audio
let currentAudio=null;
function playSound(src){
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0}
  currentAudio=new Audio(src);
  currentAudio.play().catch(()=>{});
}

function speakTTS(text,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=0.88;u.pitch=1.1;
  const voices=window.speechSynthesis.getVoices();
  const pref=voices.find(v=>v.lang===lang)||voices.find(v=>v.lang.startsWith(lang.split('-')[0]));
  if(pref) u.voice=pref;
  window.speechSynthesis.speak(u);
}

function play(idx,type){
  const a=ANIMALS[idx];
  const em=document.getElementById('em'+idx);
  const spk=document.getElementById('spk'+idx);
  em.classList.remove('bounce','wiggle','pop');
  void em.offsetWidth;
  spk.classList.add('on');
  setTimeout(()=>spk.classList.remove('on'),2000);
  if(type==='s'){
    em.classList.add('bounce');
    playSound(a.sound);
  }else if(type==='p'){
    em.classList.add('wiggle');
    speakTTS(a.pt,'pt-BR');
  }else{
    em.classList.add('pop');
    speakTTS(a.en,'en-US');
  }
}

function go(dir){
  if(busy)return;
  const n=cur+dir;
  if(n<0||n>=total)return;
  goTo(n,dir);
}

function goTo(idx,dir){
  if(busy||idx===cur)return;
  if(dir===undefined)dir=idx>cur?1:-1;
  busy=true;
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0}
  const old=document.getElementById('c'+cur);
  const nxt=document.getElementById('c'+idx);
  nxt.className='card';
  nxt.style.transform=`translateX(${dir*115}%) scale(0.85)`;
  nxt.style.opacity='0';
  nxt.style.transition='none';
  void nxt.offsetWidth;
  nxt.style.transition='';
  nxt.style.transform='translateX(0) scale(1)';
  nxt.style.opacity='1';
  old.style.transform=`translateX(${-dir*115}%) scale(0.85)`;
  old.style.opacity='0';
  setTimeout(()=>{
    old.className='card gone';
    old.style.cssText='';
    nxt.className='card active';
    nxt.style.cssText='';
    cur=idx;updateDots();busy=false;
  },420);
}

// Swipe
let tx0=0,ty0=0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.5)go(dx<0?1:-1);
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
});

window.speechSynthesis&&(window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices());
buildCards();
</script>
</body>
</html>
